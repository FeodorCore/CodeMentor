{% extends "base.html" %}
{% block title %}Редактирование категории{% endblock %}
{% block header_title %}Редактирование категории #{{ category.id }}{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-6">
        <form method="POST" action="/admin/ui/categories/{{ category.id }}/edit" class="space-y-4">
            <div>
                <label for="name" class="block text-sm font-medium text-gray-700 mb-1">Название категории</label>
                <input type="text" id="name" name="name" value="{{ category.name }}" required
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition">
            </div>
            <div class="flex items-center gap-3 pt-2">
                <button type="submit" class="px-4 py-2 bg-primary-600 text-white rounded-lg hover:bg-primary-700 transition flex items-center gap-2 shadow-sm">
                    <i data-lucide="save" class="w-4 h-4"></i> Сохранить
                </button>
                <a href="/admin/ui/categories" class="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition">Отмена</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
