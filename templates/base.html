<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Админ панель{% endblock %}</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        nav a { margin-right: 15px; }
        .container { max-width: 1200px; margin: auto; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        .btn { display: inline-block; padding: 5px 10px; margin: 2px; text-decoration: none; background: #007bff; color: white; border-radius: 3px; }
        .btn-danger { background: #dc3545; }
        .btn-warning { background: #ffc107; color: black; }
        form { margin: 10px 0; }
        input, textarea, select { margin: 5px; padding: 5px; }
        .error { color: red; }
    </style>
</head>
<body>
    <div class="container">
        <nav>
            <a href="/admin/">Главная</a>
            <a href="/admin/categories">Категории</a>
            <a href="/admin/articles">Статьи</a>
            <a href="/admin/users">Пользователи</a>
            <a href="/admin/logout">Выйти</a>
        </nav>
        <hr>
        {% block content %}{% endblock %}
    </div>
</body>
</html>
