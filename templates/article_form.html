{% extends "base.html" %}
{% block title %}{{ 'Редактировать' if article else 'Создать' }} статью{% endblock %}
{% block content %}
<h2>{{ 'Редактировать' if article else 'Создать' }} статью</h2>
<form method="post" action="/admin/articles/{{ 'update/'+article.id|string if article else 'create' }}">
    <div>
        <label>Категория:</label>
        <select name="category_id" required>
            {% for cat in categories %}
            <option value="{{ cat.id }}" {% if article and article.category_id==cat.id %}selected{% endif %}>{{ cat.name }}</option>
            {% endfor %}
        </select>
    </div>
    <div><label>Заголовок:</label><input type="text" name="title" value="{{ article.title if article else '' }}" required></div>
    <div><label>Содержание:</label><textarea name="content" rows="10" cols="50">{{ article.content if article else '' }}</textarea></div>
    <div><label>Дата расписания (YYYY-MM-DD HH:MM:SS):</label><input type="text" name="schedule_at" value="{{ article.schedule_at if article else '' }}"></div>
    <div><label>Статус:</label>
        <select name="status">
            <option value="draft" {% if article and article.status=='draft' %}selected{% endif %}>Черновик</option>
            <option value="published" {% if article and article.status=='published' %}selected{% endif %}>Опубликовано</option>
        </select>
    </div>
    <button type="submit">Сохранить</button>
</form>
<a href="/admin/articles">Назад к списку</a>
{% endblock %}
