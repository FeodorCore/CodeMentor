{% extends "base.html" %}
{% block title %}Категории{% endblock %}
{% block content %}
<h2>Категории</h2>
<h3>Добавить категорию</h3>
<form method="post" action="/admin/categories/create">
    <input type="text" name="name" placeholder="Название" required>
    <select name="parent_id">
        <option value="">-- Без родителя --</option>
        {% for cat in categories %}
        <option value="{{ cat.id }}">{{ cat.name }}</option>
        {% endfor %}
    </select>
    <button type="submit">Создать</button>
</form>
<table>
    <tr><th>ID</th><th>Название</th><th>Родитель</th><th>Действия</th></tr>
    {% for cat in categories %}
    <tr>
        <td>{{ cat.id }}</td>
        <td>{{ cat.name }}</td>
        <td>{{ cat.parent_id or '-' }}</td>
        <td>
            <form method="post" action="/admin/categories/update/{{ cat.id }}" style="display:inline-block;">
                <input type="text" name="name" value="{{ cat.name }}" required>
                <select name="parent_id">
                    <option value="">-- Нет --</option>
                    {% for c in categories %}
                        {% if c.id != cat.id %}
                        <option value="{{ c.id }}" {% if cat.parent_id == c.id %}selected{% endif %}>{{ c.name }}</option>
                        {% endif %}
                    {% endfor %}
                </select>
                <button type="submit">Обновить</button>
            </form>
            <a href="/admin/categories/delete/{{ cat.id }}" class="btn btn-danger" onclick="return confirm('Удалить?')">Удалить</a>
        </td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
